      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
